services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mail_archive
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mail_archive_dev}
      POSTGRES_DB: mail_archive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mail_archive"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://mail_archive:${DB_PASSWORD:-mail_archive_dev}@db:5432/mail_archive
      ARCHIVE_MASTER_KEY: ${ARCHIVE_MASTER_KEY:?ARCHIVE_MASTER_KEY must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: "8000"
    volumes:
      - mail-data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  mail-data:
