{% extends "base.html" %}

{% block title %}Stats — Mail Archive{% endblock %}

{% block content %}
<h2 class="mb-4">Statistics</h2>

<div class="row" id="stats-container">
    <div class="col-md-4 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title text-muted">Total Emails</h5>
                <h2 id="stat-emails" class="text-primary">—</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title text-muted">Total Attachments</h5>
                <h2 id="stat-attachments" class="text-success">—</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title text-muted">Attachment Size</h5>
                <h2 id="stat-size" class="text-info">—</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card text-center">
            <div class="card-body">
                <h5 class="card-title text-muted">Database Size</h5>
                <h2 id="stat-db" class="text-warning">—</h2>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-6">
        <h4>Sync Accounts</h4>
        <div id="accounts-list" class="list-group">
            <div class="text-muted">Loading...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const resp = await fetch('/api/stats');
        const data = await resp.json();
        
        document.getElementById('stat-emails').textContent = data.total_emails.toLocaleString();
        document.getElementById('stat-attachments').textContent = data.total_attachments.toLocaleString();
        document.getElementById('stat-size').textContent = formatBytes(data.attachment_size_bytes);
        document.getElementById('stat-db').textContent = formatBytes(data.db_size);
    } catch(e) {
        console.error('Failed to load stats', e);
    }
    
    try {
        const resp = await fetch('/api/accounts');
        const accounts = await resp.json();
        const container = document.getElementById('accounts-list');
        
        if (accounts.length === 0) {
            container.innerHTML = '<div class="text-muted">No accounts configured</div>';
            return;
        }
        
        container.innerHTML = accounts.map(a => `
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <strong>${escapeHtml(a.email_address)}</strong>
                    ${a.label ? `<br><small class="text-muted">${escapeHtml(a.label)}</small>` : ''}
                </div>
                <div>
                    <span class="badge ${a.enabled ? 'bg-success' : 'bg-secondary'}">${a.enabled ? 'Active' : 'Disabled'}</span>
                    ${a.last_sync_at ? `<br><small class="text-muted">${new Date(a.last_sync_at).toLocaleString()}</small>` : '<br><small class="text-muted">Never synced</small>'}
                </div>
            </div>
        `).join('');
    } catch(e) {
        console.error('Failed to load accounts', e);
    }
});

function formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
